# ── Headers ───────────────────────────────────────────────────────────────────

# Security headers on ALL paths
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options           = "nosniff"
    Referrer-Policy                  = "strict-origin-when-cross-origin"
    X-Frame-Options                  = "SAMEORIGIN"
    Permissions-Policy               = "geolocation=(), microphone=(), camera=(), interest-cohort=(), payment=(), usb=()"
    Cross-Origin-Resource-Policy     = "same-site"
    # COOP isolates the top-level browsing context (A-OPS-04). COEP (require-corp)
    # is intentionally NOT set: it would block the cross-origin embeds this site
    # relies on (YouTube, Cloudflare Turnstile, Google Analytics) since they don't
    # all send CORP/COEP-compatible headers.
    Cross-Origin-Opener-Policy       = "same-origin"
    Strict-Transport-Security        = "max-age=63072000; includeSubDomains; preload"
    # CSP promoted from Report-Only → enforce on 2026-05-22 (Marianas Batch 3).
    # script-src: 'unsafe-inline' replaced by SHA256 hashes auto-generated by
    # scripts/build/csp-hashes.mjs (invoked at end of `npm run build:pages`).
    # No 'unsafe-hashes' needed — the former inline onload= preload-swap handler
    # was refactored into src/components/shared/preload-swap.html (a hashed
    # <script>), so Safari 14–15.3 (which lacks 'unsafe-hashes' support) keeps
    # working too.
    # style-src still uses 'unsafe-inline' (95+ inline style attrs — hash-based
    # would be high-churn; revisit when those are CSS-classes-only).
    # img-src tightened from https: to 'self' data:.
    # connect-src includes 'self' which covers /.netlify/functions/contact.
    # Webfonts self-hosted (assets/fonts/) — no fonts.googleapis.com / fonts.gstatic.com.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self' 'sha256-Ai+1ECklifoE0HXzH8oAbuZaiUd40kDhRwmB7HcNAKY=' 'sha256-HD83+sdi5cDoXWRXoruMZGVfEjVOJ+ybEO3N+Z3Wni0=' 'sha256-RcUauUnHZT8NQZ1iG29e3f+LEvTPXqCs3gR0esKAUd0=' 'sha256-TAS+3v3EjtoDxWgQ0RgNNZZXjM0K2WPGROj69+hiZo0=' 'sha256-cZuFglxUoe1Um9cWo4pBB9/Irk5tF0GLfQMJtxohhNI=' 'sha256-eDCM1ROugzO2wIdGzWamqMtet5bLjt9AFi+h9B9ckCY=' 'sha256-flffT04HhBk3vgJVzM8mp8lr7KBdG2ix3CYuXfEGNsI=' 'sha256-ufH/13YF7f5UVkpgN1lNPiY0wpzRDX5UFU6JZ/OCGVA=' https://www.googletagmanager.com https://www.google-analytics.com https://challenges.cloudflare.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://stats.g.doubleclick.net https://challenges.cloudflare.com; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://challenges.cloudflare.com;"

# HTML — no cache (cada deploy genera HTML nuevo)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# Root (index.html implícito)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# JSON de i18n — 1 día fresh + 1 semana stale-while-revalidate.
# El contenido cambia solo en deploys, que invalidan la CDN automáticamente.
# El caché del navegador puede servir la versión anterior sin bloquear
# la siguiente carga (stale-while-revalidate la renueva en background).
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# CSS y JS — 7 días (los nombres de archivo no son fingerprinted, así que
# conservador: suficiente para ahorrar requests sin arriesgarnos a stale cache)
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Imágenes — 30 días (cambian poco, peso alto)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Webfonts — 30 días + immutable (nunca cambian sin cambiar el nombre).
# Las fuentes self-hosted viven en /assets/fonts/ (no /assets/webfonts/), así que
# el bloque debe apuntar ahí o las woff2 caen al catch-all /* sin Cache-Control (P-PERF-03).
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
