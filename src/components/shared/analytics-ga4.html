<script>

	var isLocalPreview = /^(localhost|127\.0\.0\.1)$/i.test(window.location.hostname);

		provider: isLocalPreview ? '' : 'turnstile',
		siteKey: isLocalPreview ? '' : '0x4AAAAAACjZQ2Ce6kH-DpQo'

		document.head.appendChild(script);

		gtag('config', 'G-T8FTTWBQS3', { anonymize_ip: true });

		try {
			var stored = window.localStorage.getItem('portfolio_consent');
			if (stored === 'granted') {
				gtag('consent', 'update', {
					analytics_storage: 'granted',
					ad_storage: 'denied',
					ad_user_data: 'denied',
					ad_personalization: 'denied'

	} else {

	}
</script>
