<!-- Cookie consent banner — GDPR / Chile Ley 21.719 -->
<div id="cookie-consent-banner" class="cookie-consent" role="dialog" aria-modal="false" aria-live="polite" aria-labelledby="cookie-consent-title" hidden>
	<div class="cookie-consent_inner">
		<div class="cookie-consent_copy">
			<h2 id="cookie-consent-title" class="cookie-consent_title" translate="cookie-consent-title">Cookies, briefly</h2>
			<p class="cookie-consent_body" translate="cookie-consent-body">This site uses Google Analytics to understand how visitors arrive and what they read. Nothing is sold or shared. Decide what you prefer.</p>
		</div>
		<div class="cookie-consent_actions">
			<button type="button" id="cookie-consent-decline" class="cookie-consent_btn cookie-consent_btn--ghost" translate="cookie-consent-decline">Decline</button>
			<button type="button" id="cookie-consent-accept" class="cookie-consent_btn cookie-consent_btn--primary" translate="cookie-consent-accept">Accept analytics</button>
		</div>
		<a class="cookie-consent_link" href="privacy.html" translate="cookie-consent-policy">Privacy policy</a>
	</div>
</div>
<script src="assets/js/cookie-consent.min.js" defer></script>
