# Dossier approved claims — allowlist
#
# Any factual claim (percentages, counts, named symbols, postmortems, schema versions,
# positioning scores) detected by `scripts/dossier-claim-check.py` in a staged dossier
# file MUST appear here, OR the pre-commit hook will block the commit.
#
# Format:
#   approved:
#     - pattern: "<literal substring OR `re:<regex>`>"
#       source: "<repo-tag>: <file-path[:line]>"
#       notes: "<optional context, e.g. measurement date, baseline, n>"
#
# How to update:
#   1. Verify the claim against the source-of-truth repo (legal-reg-tech, aglaya.biz, etc.).
#   2. For metrics: confirm the number appears in the repo's canonical metrics doc
#      (e.g. legal-reg-tech: docs/06-que-evidencia-lo-sostiene/03-metricas-de-producto.md).
#   3. For code symbols: confirm via `graphify explain "<symbol>"` or grep.
#   4. Add an entry below with the citation.
#
# Bypass for emergency:
#   DOSSIER_CHECK_SKIP=1 git commit ...        (skip entirely)
#   DOSSIER_CHECK_WARN_ONLY=1 git commit ...   (warn only, don't block)

